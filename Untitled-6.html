<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#10423f">
  <title>Sunny English - Special Kids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #13222f;
      --muted: #596b78;
      --paper: #f7fbf6;
      --panel: #ffffff;
      --line: rgba(19, 34, 47, 0.13);
      --green: #2fbf71;
      --teal: #1aa6a6;
      --sun: #f7b733;
      --rose: #f0646f;
      --blue: #3d8bfd;
      --violet: #8067dc;
      --shadow: 0 18px 42px rgba(19, 44, 62, 0.12);
      --shadow-soft: 0 10px 26px rgba(19, 44, 62, 0.10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      scroll-behavior: smooth;
    }

    body { min-height: 100%; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(47, 191, 113, 0.15), rgba(61, 139, 253, 0.12)),
        var(--paper);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button, input, textarea { font: inherit; }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.68;
    }

    :focus-visible {
      outline: 3px solid rgba(26, 166, 166, 0.34);
      outline-offset: 3px;
    }

    a { color: inherit; }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(16px, 4vw, 42px);
      background: rgba(247, 251, 246, 0.92);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 24px rgba(19, 44, 62, 0.06);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at 34% 32%, #fff6c7, var(--sun) 55%, #f47b35);
      box-shadow: 0 8px 22px rgba(247, 183, 51, 0.34);
      font-size: 24px;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-family: Nunito, Inter, sans-serif;
      font-size: clamp(1.15rem, 3vw, 1.55rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .brand p {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .icon-btn,
    .primary-btn,
    .soft-btn,
    .danger-btn,
    .language-toggle {
      min-height: 42px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      font-weight: 800;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }

    .icon-btn {
      width: 42px;
      padding: 0;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
    }

    .primary-btn {
      background: var(--green);
      color: #fff;
      box-shadow: 0 10px 22px rgba(47, 191, 113, 0.28);
    }

    .soft-btn {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .language-toggle {
      background: #13222f;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow: var(--shadow-soft);
      white-space: nowrap;
    }

    .danger-btn {
      background: #ffe9eb;
      color: #a12835;
    }

    .icon-btn:hover,
    .primary-btn:hover,
    .soft-btn:hover,
    .danger-btn:hover,
    .language-toggle:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(23, 33, 43, 0.12);
    }

    .primary-btn:active,
    .soft-btn:active,
    .danger-btn:active,
    .language-toggle:active,
    .icon-btn:active,
    .page-tile:active,
    .letter-card:active,
    .flashcard:active {
      transform: translateY(0);
    }

    .main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .hero {
      min-height: calc(100vh - 122px);
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      gap: 34px;
      align-items: center;
      padding-bottom: 42px;
    }

    .hero-copy h2 {
      margin: 0;
      max-width: 12ch;
      font-family: Nunito, Inter, sans-serif;
      font-weight: 900;
      font-size: clamp(2.6rem, 8vw, 6.4rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .hero-copy p {
      margin: 22px 0 0;
      max-width: 58ch;
      color: #33424f;
      font-size: clamp(1rem, 2vw, 1.18rem);
      line-height: 1.7;
      font-weight: 600;
    }

    .hero-strip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid var(--line);
      font-size: 0.86rem;
      font-weight: 800;
      color: #33424f;
    }

    .page-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .page-tile {
      min-height: 168px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 18px;
      border-radius: var(--radius);
      color: #fff;
      box-shadow: var(--shadow);
      text-align: left;
      overflow: hidden;
      position: relative;
      transition: transform 0.22s ease, box-shadow 0.22s ease, filter 0.22s ease;
      isolation: isolate;
    }

    .page-tile::after {
      content: "";
      position: absolute;
      right: -24px;
      bottom: -34px;
      width: 128px;
      height: 128px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transition: transform 0.28s ease, opacity 0.28s ease;
    }

    .page-tile:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 48px rgba(19, 44, 62, 0.18);
      filter: saturate(1.04);
    }

    .page-tile:hover::after {
      opacity: 0.34;
      transform: scale(1.08);
    }

    .page-tile strong {
      display: block;
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.28rem;
      line-height: 1.12;
      letter-spacing: 0;
      position: relative;
      z-index: 1;
    }

    .page-tile span {
      display: block;
      max-width: 24ch;
      font-weight: 700;
      line-height: 1.45;
      opacity: 0.92;
      position: relative;
      z-index: 1;
    }

    .tile-icon {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.22);
      font-size: 24px;
      position: relative;
      z-index: 1;
    }

    .tile-green { background: linear-gradient(135deg, #239d65, #25b99b); }
    .tile-blue { background: linear-gradient(135deg, #2776d8, #43b1f6); }
    .tile-sun { background: linear-gradient(135deg, #de8426, #f7b733); }
    .tile-rose { background: linear-gradient(135deg, #d8445f, #f58262); }
    .tile-violet { background: linear-gradient(135deg, #654fd0, #9b72e8); }
    .tile-teal { background: linear-gradient(135deg, #0d827f, #20b9aa); }

    .page-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .page-head h2 {
      margin: 0;
      font-family: Nunito, Inter, sans-serif;
      font-size: clamp(2rem, 6vw, 4.2rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .page-head p {
      margin: 10px 0 0;
      max-width: 62ch;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.65;
    }

    .panel {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: clamp(16px, 3vw, 24px);
      box-shadow: var(--shadow);
    }

    .split {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .alphabet-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(72px, 1fr));
      gap: 10px;
    }

    .letter-card,
    .word-card,
    .task-card,
    .link-card {
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow-soft);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .letter-card {
      min-height: 78px;
      display: grid;
      place-items: center;
      font-family: Nunito, Inter, sans-serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: #0f6f75;
    }

    .letter-card:hover,
    .word-card:hover,
    .task-card:hover,
    .flashcard:hover {
      border-color: rgba(26, 166, 166, 0.28);
      box-shadow: 0 14px 30px rgba(23, 33, 43, 0.10);
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 12px;
    }

    .word-card {
      padding: 16px;
    }

    .word-card strong {
      display: block;
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .word-card p {
      margin: 4px 0;
      color: var(--muted);
      font-weight: 700;
    }

    .vocab-section {
      margin-bottom: 28px;
    }

    .vocab-section h3 {
      margin: 0 0 14px;
      padding: 10px 14px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(47, 191, 113, 0.14), rgba(61, 139, 253, 0.1));
      border: 1px solid var(--line);
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--ink);
    }

    .vocab-section + .vocab-section {
      padding-top: 4px;
    }

    .lesson-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }

    .day-label {
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
    }

    .task-output {
      min-height: 260px;
      display: grid;
      gap: 12px;
    }

    .task-card {
      padding: 16px;
    }

    .task-card h3 {
      margin: 0 0 8px;
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.35rem;
    }

    .task-card p,
    .task-card li {
      color: #33424f;
      font-weight: 600;
      line-height: 1.65;
    }

    .task-card ul { margin: 10px 0 0; padding-left: 20px; }

    .flashcards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .flashcard {
      min-height: 98px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 12px;
      border-radius: var(--radius);
      background: #f2fbf8;
      border: 1px solid rgba(47, 191, 113, 0.22);
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.18rem;
      font-weight: 900;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .flashcard small {
      display: block;
      color: var(--muted);
      font-family: Inter, sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      margin-top: 4px;
    }

    .links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .link-card {
      display: block;
      padding: 16px;
      text-decoration: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(23, 33, 43, 0.12);
    }

    .link-card strong {
      display: block;
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.2rem;
      margin-bottom: 6px;
    }

    .link-card span {
      color: var(--muted);
      font-weight: 600;
      line-height: 1.55;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }

    .media-box {
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border-radius: var(--radius);
      background: #eaf5f3;
      border: 1px solid var(--line);
    }

    .media-box img,
    .media-box video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .assistant-layout {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 16px;
    }

    .assistant-orb {
      min-height: 300px;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(160deg, #0f6f75, #24b395);
      color: #fff;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .assistant-orb button {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: #fff;
      color: #0f6f75;
      font-size: 56px;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
    }

    .assistant-orb button.listening {
      animation: pulse 1.1s ease-in-out infinite;
      color: #d8445f;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    .assistant-orb p {
      margin: 18px 0 0;
      font-weight: 800;
      line-height: 1.6;
    }

    .chat-log {
      height: min(58vh, 560px);
      min-height: 340px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      scroll-behavior: smooth;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
    }

    .message {
      max-width: 82%;
      padding: 12px 14px;
      border-radius: var(--radius);
      font-weight: 600;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .message.user {
      align-self: flex-end;
      background: #eaf5ff;
    }

    .message.bot {
      align-self: flex-start;
      background: #f1fbf6;
    }

    .text-ask {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      margin-top: 10px;
    }

    .text-ask input,
    .settings-card input {
      width: 100%;
      min-height: 46px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      outline: none;
      font-weight: 600;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .text-ask input:focus,
    .settings-card input:focus {
      border-color: rgba(26, 166, 166, 0.55);
      box-shadow: 0 0 0 4px rgba(26, 166, 166, 0.12);
    }

    .settings-card {
      position: fixed;
      right: 16px;
      top: 76px;
      z-index: 50;
      width: min(380px, calc(100vw - 32px));
      padding: 16px;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(23, 33, 43, 0.24);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-8px);
      transition: opacity 0.2s ease, transform 0.2s ease, visibility 0.2s ease;
      visibility: hidden;
    }

    .settings-card.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
      visibility: visible;
    }

    .settings-card h3 {
      margin: 0 0 10px;
      font-family: Nunito, Inter, sans-serif;
      font-size: 1.35rem;
    }

    .settings-card p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 600;
      line-height: 1.55;
    }

    .settings-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .notice {
      margin-top: 10px;
      color: #126d49;
      font-weight: 800;
      min-height: 22px;
    }

    .empty {
      min-height: 220px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.7;
      border: 1px dashed rgba(23, 33, 43, 0.24);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.58);
      padding: 24px;
    }

    .day-pick.is-today {
      border-color: rgba(47, 191, 113, 0.45);
      box-shadow: 0 12px 28px rgba(47, 191, 113, 0.18);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 860px) {
      .hero,
      .split,
      .assistant-layout {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
        padding-top: 18px;
      }

      .page-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .hero-copy h2 {
        font-size: 3.2rem;
      }

      .page-head {
        display: block;
      }

      .lesson-toolbar,
      .text-ask {
        grid-template-columns: 1fr;
      }

      .message { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">☀️</div>
        <div>
          <h1>Sunny English</h1>
          <p id="brandTagline">For Kids · интерактивті сабақтар</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="soft-btn" type="button" data-home id="homeBtn">🏠 Басты бет</button>
        <button class="soft-btn" type="button" data-open-page="daily" id="dailyBtn">📅 Тапсырмалар</button>
        <button class="soft-btn" type="button" data-open-page="assistant" id="assistantBtn">🎙️ Көмекші</button>
        <button class="language-toggle" type="button" id="languageToggle">🌐 Рус</button>
      </div>
    </header>

    <main class="main" id="app"></main>
  </div>


  <script src="daily-lessons.js"></script>
  <script src="vocabulary-data.js"></script>
  <script>
    (() => {
      const LANG_STORAGE = "sunny_interface_language";

      const pageBase = {
        alphabet: { icon: "🔤", color: "tile-blue" },
        daily: { icon: "📅", color: "tile-green" },
        words: { icon: "📝", color: "tile-sun" },
        reading: { icon: "📚", color: "tile-rose" },
        media: { icon: "🖼️", color: "tile-violet" },
        assistant: { icon: "🎙️", color: "tile-teal" }
      };

      const copy = {
        kk: {
          locale: "kk-KZ",
          speech: "kk-KZ",
          documentTitle: "Sunny English - For kids",
          brandTagline: "For Kids · интерактивті сабақтар",
          navHome: "🏠 Басты бет",
          navDaily: "📅 Тапсырмалар",
          navAssistant: "🎙️ Көмекші",
          langToggle: "🌐 Рус",
          langTitle: "Орыс тіліне ауысу",
          homeLead: "Балаларға арналған оқу сайты: жарық, тыныш және барлық бөлімдері сайттың ішінде ашылады. 7 күндік Sunny English бағдарламасы: карточкалар, жаттығу, ойын және шағын тапсырмалар.",
          pages: {

        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")

        renderCurrentPage();

        if (!("speechSynthesis" in window)) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);

        utterance.rate = 0.92;
        window.speechSynthesis.speak(utterance);

        const wordHints = (todayLesson.cards || []).slice(0, 4).map((card) => `${card.en} — ${card.native}`).join(", ");

        if (/hello|сәлем|привет|салем/.test(q)) {

            ? "Сәлем! Мен Санимын. Бүгін «Hello» деп айтып, қол бұлға. Hello = Сәлем."

        if (/today|бүгін|сегодня|тапсырма|задани/.test(q)) {

        }
        if (/word|сөз|слов|cat|dog|apple|mother|color|түс|цвет/.test(q)) {
          return lang === "kk"
            ? `Бүгінгі сөздер: ${wordHints}. Әр сөзді 3 рет баяу қайтала.`
            : `Слова дня: ${wordHints}. Повтори каждое слово 3 раза медленно.`;
        }
        if (/alphabet|әріп|алфавит|letter/.test(q)) {
          return lang === "kk"
            ? "Әліпби бөлімін аш. Бір әріпті таңда, дауыстап айт және қағазға жаз."
            : "Открой раздел «Алфавит». Выбери одну букву, скажи вслух и напиши на бумаге.";
        }
        if (/thank|рахмет|спасибо/.test(q)) {
          return lang === "kk"
            ? "Рақмет! Сен жақсы істеп жатырсың. Thank you = Рақмет."
            : "Спасибо! Ты хорошо стараешься. Thank you = Спасибо.";
        }
        return lang === "kk"
          ? "Мен Санимын. Ағылшын сөзін, бүгінгі тапсырманы немесе әріпті сұра. Мысалы: «Бүгінгі тапсырма қандай?»"

      }

        let recognition = null;

        addMessage(c.assistantGreeting, "bot");

        function ask(question) {
          const clean = question.trim();
          if (!clean) return;
          addMessage(clean, "user");
          status.textContent = c.assistantThinking;
          const answer = localAssistantAnswer(clean);
          addMessage(answer, "bot");
          status.textContent = c.assistantDone;
          speak(answer, c.speech);
        }

        sendQuestion.addEventListener("click", () => {
          const value = textQuestion.value;
          textQuestion.value = "";
          ask(value);
        });

        textQuestion.addEventListener("keydown", (event) => {
          if (event.key === "Enter") {
            event.preventDefault();
            sendQuestion.click();
          }
        });

        if (Recognition) {
          recognition = new Recognition();
          recognition.lang = c.speech;
          recognition.continuous = false;
          recognition.interimResults = false;

          recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript || "";
            voiceButton.classList.remove("listening");
            ask(transcript);
          };

          recognition.onerror = () => {
            voiceButton.classList.remove("listening");
            status.textContent = c.voiceError;
          };

          recognition.onend = () => {
            voiceButton.classList.remove("listening");
          };
        }

        voiceButton.addEventListener("click", () => {
          if (!recognition) {
            status.textContent = c.voiceUnavailable;
            return;
          }

          try {
            recognition.start();
            voiceButton.classList.add("listening");
            status.textContent = c.listening;
          } catch (_) {
            recognition.stop();
          }
        });
      }

      function renderCurrentPage() {
        if (activePage === "home") renderHome();
        else if (activePage === "alphabet") renderAlphabet();
        else if (activePage === "daily") renderDaily();
        else if (activePage === "words") renderWords();
        else if (activePage === "reading") renderReading();
        else if (activePage === "media") renderMedia();
        else if (activePage === "assistant") renderAssistant();
        else renderHome();
      }

      document.querySelectorAll("[data-open-page]").forEach((button) => {
        button.addEventListener("click", () => openPage(button.dataset.openPage));
      });

      document.querySelectorAll("[data-home]").forEach((button) => {
        button.addEventListener("click", () => openPage("home"));
      });

      window.addEventListener("popstate", () => {
        activePage = getPageFromUrl();
        renderCurrentPage();
      });

      document.getElementById("languageToggle").addEventListener("click", () => {
        lang = lang === "kk" ? "ru" : "kk";
        localStorage.setItem(LANG_STORAGE, lang);
        applyLanguage();
        renderCurrentPage();
      });

      window.addEventListener("storage", (event) => {
        if (event.key !== LANG_STORAGE) return;
        const nextLang = normalizeLanguage(event.newValue);
        if (nextLang === lang) return;
        lang = nextLang;
        applyLanguage();
        renderCurrentPage();
      });

      applyLanguage();
      renderCurrentPage();
    })();
  </script>
</body>
</html>
